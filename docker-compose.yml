version: '3.8'

services:
  mongo:
    image: mongo
    container_name: mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  api:
    build: .
    container_name: todo-api
    ports:
      - "3000:3000"
    depends_on:
      - mongo
    restart: always

volumes:
  mongo-data:
